services:
  - type: web
    name: bioAPI
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAX_UPLOAD_SIZE_MB
        value: 50
      - key: API_KEY
        generateValue: true
